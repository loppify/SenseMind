version: '3.8'
services:
  app:
    build: .
    environment:
      - DATABASE_URL=sqlite:///sensemind.db
      - JWT_SECRET_KEY=scaling-secret-key
    expose:
      - "5000"
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
