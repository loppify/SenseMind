<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseMind AI | Premium Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root[data-theme="dark"] {
            --bg: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --surface-solid: #111827;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --danger: #ef4444;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        :root[data-theme="light"] {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-solid: #ffffff;
            --border: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.15);
            --danger: #dc2626;
            --gradient: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
        }

        * { transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, var(--accent-glow) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
        }

        .premium-card {
            background: var(--surface);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
        }

        .navbar {
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 0;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -1px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-vibe {
            background: var(--gradient);
            color: white !important;
            border: none;
            border-radius: 14px;
            padding: 12px 28px;
            font-weight: 700;
            box-shadow: 0 10px 20px -5px var(--accent-glow);
        }

        .btn-vibe:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px -5px var(--accent-glow);
        }

        .control-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .control-btn:hover { background: var(--border); }

        .form-control {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-main);
            padding: 14px 18px;
        }

        .form-control:focus {
            background: var(--surface-solid);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            color: var(--text-main);
        }

        .state-orb {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
            box-shadow: 0 0 60px -10px var(--accent-glow);
        }

        .state-orb::before {
            content: '';
            position: absolute;
            width: 120%; height: 120%;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.1;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.15); opacity: 0.2; }
        }

        .logout-link {
            color: var(--danger);
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .logout-link:hover { background: rgba(239, 68, 68, 0.1); }

        #auth-view { max-width: 480px; margin: 100px auto; }
        
        .nav-pills .nav-link {
            color: var(--text-muted);
            border-radius: 12px;
            font-weight: 600;
        }
        .nav-pills .nav-link.active { background: var(--gradient); color: white; }

        .loader-spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .device-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand">SENSEMIND AI</span>
            <div class="d-flex gap-3 align-items-center">
                <div class="control-btn" onclick="toggleLanguage()" title="Switch Language">
                    <span id="lang-label" class="fw-bold small">EN</span>
                </div>
                <div class="control-btn" onclick="toggleTheme()" id="theme-toggle">
                    <i data-lucide="moon" size="20"></i>
                </div>
                <div id="user-controls" style="display:none;">
                    <a href="#" onclick="logout()" class="logout-link">
                        <i data-lucide="power" size="18"></i> <span data-i18n="logout">Вийти</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- AUTH SECTION -->
        <div id="auth-view" class="premium-card">
            <ul class="nav nav-pills nav-fill mb-4 p-1 bg-black bg-opacity-10 rounded-3">
                <li class="nav-item">
                    <a class="nav-link active" id="tab-login" onclick="setAuthMode('login')" data-i18n="login_tab">Вхід</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="tab-reg" onclick="setAuthMode('reg')" data-i18n="reg_tab">Реєстрація</a>
                </li>
            </ul>

            <div id="login-form">
                <h3 class="fw-800 mb-1" data-i18n="login_title">Вітаємо знову.</h3>
                <p class="text-muted mb-4" data-i18n="login_subtitle">Увійдіть для перегляду аналітики.</p>
                <div class="mb-3">
                    <input type="text" id="l-user" class="form-control" placeholder="Username" data-i18n-placeholder="username">
                </div>
                <div class="mb-4">
                    <input type="password" id="l-pass" class="form-control" placeholder="Password" data-i18n-placeholder="password">
                </div>
                <button class="btn-vibe w-100 d-flex align-items-center justify-content-center gap-2" onclick="handleLogin()">
                    <span data-i18n="login_btn">Увійти</span>
                    <div class="loader-spinner" id="l-loader"></div>
                </button>
            </div>

            <div id="reg-form" style="display:none;">
                <h3 class="fw-800 mb-1" data-i18n="reg_title">Новий аккаунт.</h3>
                <p class="text-muted mb-4" data-i18n="reg_subtitle">Створіть профіль за хвилину.</p>
                <div class="mb-3">
                    <input type="text" id="r-user" class="form-control" placeholder="Username" data-i18n-placeholder="username">
                </div>
                <div class="mb-3">
                    <input type="email" id="r-email" class="form-control" placeholder="Email">
                </div>
                <div class="mb-4">
                    <input type="password" id="r-pass" class="form-control" placeholder="Password" data-i18n-placeholder="password">
                </div>
                <button class="btn-vibe w-100 d-flex align-items-center justify-content-center gap-2" onclick="handleRegister()">
                    <span data-i18n="reg_btn">Зареєструватися</span>
                    <div class="loader-spinner" id="r-loader"></div>
                </button>
            </div>
            <div id="auth-msg" class="mt-3 text-center small text-danger" style="display:none;"></div>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="dash-view" style="display:none;">
            <div class="row g-4">
                <!-- Status Card -->
                <div class="col-xl-4 col-lg-5">
                    <div class="premium-card h-100 text-center">
                        <div class="state-orb" id="status-orb">
                            <i data-lucide="zap" size="54" color="white"></i>
                        </div>
                        <h6 class="text-uppercase tracking-widest text-muted small fw-800 mb-2" data-i18n="current_status">Поточний стан</h6>
                        <h1 class="display-5 fw-800 mb-4" id="state-text">---</h1>
                        
                        <div class="p-4 rounded-4 bg-black bg-opacity-5 text-start">
                            <div class="d-flex align-items-center gap-2 mb-2 text-muted small fw-bold">
                                <i data-lucide="info" size="16"></i> <span data-i18n="ai_recommendation">AI Рекомендація</span>
                            </div>
                            <p class="mb-0 fw-500" id="rec-text" data-i18n="waiting_data">Синхронізація з хмарою...</p>
                        </div>
                    </div>
                </div>

                <!-- History Chart -->
                <div class="col-xl-8 col-lg-7">
                    <div class="premium-card h-100">
                        <div class="d-flex justify-content-between align-items-center mb-5">
                            <div>
                                <h4 class="fw-800 mb-0" data-i18n="history_title">Динаміка стану</h4>
                                <p class="text-muted small mb-0" data-i18n="history_subtitle">Аналіз за останню годину активності</p>
                            </div>
                            <div class="control-btn" onclick="refreshData()"><i data-lucide="refresh-cw" size="18"></i></div>
                        </div>
                        <div style="height: 320px; width: 100%;">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Devices Section -->
                <div class="col-12">
                    <div class="premium-card">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-800 mb-0" data-i18n="my_devices">Мої пристрої</h5>
                            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="alert('Demo: Use Android App to link devices')" data-i18n="add_device">+ Додати</button>
                        </div>
                        <div id="device-list" class="row g-3">
                            <!-- Devices injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Translations
        const i18n = {
            uk: {
                logout: "Вийти", login_tab: "Вхід", reg_tab: "Реєстрація",
                login_title: "З поверненням.", login_subtitle: "Увійдіть для перегляду аналітики.",
                login_btn: "Увійти", reg_title: "Новий аккаунт.",
                reg_subtitle: "Створіть профіль за хвилину.", reg_btn: "Створити профіль",
                username: "Логін", password: "Пароль", current_status: "Поточний стан",
                ai_recommendation: "AI Рекомендація", waiting_data: "Синхронізація...",
                history_title: "Динаміка стану", history_subtitle: "Аналіз активності",
                my_devices: "Мої пристрої", add_device: "Додати",
                Stress: "Стрес", Calm: "Спокій", Focus: "Концентрація", Relaxed: "Релакс"
            },
            en: {
                logout: "Logout", login_tab: "Login", reg_tab: "Register",
                login_title: "Welcome back.", login_subtitle: "Log in to view your analytics.",
                login_btn: "Log In", reg_title: "New Account.",
                reg_subtitle: "Create your profile in a minute.", reg_btn: "Sign Up",
                username: "Username", password: "Password", current_status: "Current Status",
                ai_recommendation: "AI Recommendation", waiting_data: "Syncing data...",
                history_title: "State Dynamics", history_subtitle: "Last hour activity",
                my_devices: "My Devices", add_device: "Add",
                Stress: "Stress", Calm: "Calm", Focus: "Focus", Relaxed: "Relaxed"
            }
        };

        let currentLang = localStorage.getItem('sm_lang') || 'uk';
        let currentTheme = localStorage.getItem('sm_theme') || 'dark';
        let token = localStorage.getItem('sm_token');
        let chart = null;

        // UI Management
        function applyI18n() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[currentLang][key] || key;
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = i18n[currentLang][key] || key;
            });
            document.getElementById('lang-label').innerText = currentLang.toUpperCase();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'uk' ? 'en' : 'uk';
            localStorage.setItem('sm_lang', currentLang);
            applyI18n();
            if(token) refreshData();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('sm_theme', currentTheme);
            updateThemeIcon();
            if(chart) {
                chart.options.scales.x.grid.color = currentTheme === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                chart.update();
            }
        }

        function updateThemeIcon() {
            const btn = document.getElementById('theme-toggle');
            btn.innerHTML = currentTheme === 'dark' ? '<i data-lucide="sun" size="20"></i>' : '<i data-lucide="moon" size="20"></i>';
            lucide.createIcons();
        }

        function setAuthMode(mode) {
            document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('reg-form').style.display = mode === 'reg' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-reg').classList.toggle('active', mode === 'reg');
        }

        // Logic
        async function handleLogin() {
            const btn = document.querySelector('#login-form button');
            const loader = document.getElementById('l-loader');
            const msg = document.getElementById('auth-msg');
            
            loader.style.display = 'block';
            msg.style.display = 'none';

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('l-user').value,
                        password: document.getElementById('l-pass').value
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    token = data.access_token;
                    localStorage.setItem('sm_token', token);
                    location.reload();
                } else {
                    msg.innerText = data.msg || 'Error';
                    msg.style.display = 'block';
                }
            } catch(e) { msg.innerText = 'Server Error'; msg.style.display = 'block'; }
            finally { loader.style.display = 'none'; }
        }

        async function handleRegister() {
            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('r-user').value,
                        email: document.getElementById('r-email').value,
                        password: document.getElementById('r-pass').value
                    })
                });
                if(res.ok) {
                    alert('Success! Please log in.');
                    setAuthMode('login');
                } else {
                    const data = await res.json();
                    alert(data.msg || 'Error');
                }
            } catch(e) { alert('Server Error'); }
        }

        function logout() {
            localStorage.removeItem('sm_token');
            location.reload();
        }

        async function refreshData() {
            if(!token) return;
            try {
                // Get devices first to find an ID
                const resD = await fetch('/api/v1/devices/my', { headers: {'Authorization': `Bearer ${token}`} });
                let activeDeviceId = 1;
                if(resD.ok) {
                    const devices = await resD.json();
                    const cont = document.getElementById('device-list');
                    cont.innerHTML = devices.length ? '' : `<p class="text-muted small">${currentLang === 'uk' ? 'Пристрої не знайдено' : 'No devices found'}</p>`;
                    if(devices.length) {
                        activeDeviceId = devices[0].id;
                        devices.forEach(dev => {
                            cont.innerHTML += `
                                <div class="col-md-4">
                                    <div class="device-item">
                                        <div>
                                            <div class="fw-bold">${dev.name}</div>
                                            <div class="small text-muted">${dev.device_serial_id}</div>
                                        </div>
                                        <i data-lucide="cpu" size="18" class="text-muted"></i>
                                    </div>
                                </div>
                            `;
                        });
                        lucide.createIcons();
                    }
                }

                // Current State
                const resS = await fetch(`/api/v1/status/current/${activeDeviceId}`, { headers: {'Authorization': `Bearer ${token}`} });
                if(resS.ok) {
                    const d = await resS.json();
                    const translatedState = i18n[currentLang][d.classified_state] || d.classified_state;
                    document.getElementById('state-text').innerText = translatedState;
                    document.getElementById('rec-text').innerText = d.recommendation;
                    
                    const colors = { Stress: '#ef4444', Calm: '#22c55e', Focus: '#6366f1' };
                    document.getElementById('status-orb').style.background = colors[d.classified_state] || 'var(--gradient)';
                }

                // History
                const resH = await fetch(`/api/v1/history/${activeDeviceId}`, { headers: {'Authorization': `Bearer ${token}`} });
                if(resH.ok) {
                    const history = await resH.json();
                    const stateMap = { Relaxed: 0, Calm: 1, Focus: 2, Stress: 3 };
                    chart.data.labels = history.map(h => "");
                    chart.data.datasets[0].data = history.map(h => stateMap[h.classified_state] || 0);
                    chart.update();
                }
            } catch(e) { console.warn('Sync failed', e); }
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#6366f1',
                        borderWidth: 4,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                            gradient.addColorStop(0, 'rgba(99, 102, 241, 0)');
                            gradient.addColorStop(1, 'rgba(99, 102, 241, 0.2)');
                            return gradient;
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, min: -0.5, max: 3.5 },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // Init
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();
        
        if(token) {
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('dash-view').style.display = 'block';
            document.getElementById('user-controls').style.display = 'block';
            initChart();
            refreshData();
            setInterval(refreshData, 15000);
        }

        applyI18n();
        lucide.createIcons();
    </script>
</body>
</html>
