<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseMind - Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .state-indicator { width: 20px; height: 20px; border-radius: 50%; display: inline-block; }
        .state-calm { background-color: #28a745; }
        .state-focus { background-color: #007bff; }
        .state-stress { background-color: #dc3545; }
        #admin-panel, #user-dashboard { display: none; }
        #auth-section { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">SenseMind</a>
            <div id="nav-controls" style="display:none;">
                <button id="btn-logout" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Login Section -->
        <div id="auth-section" class="card p-4 shadow">
            <h3 class="text-center mb-4">Login to SenseMind</h3>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="login-user" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="login-pass" class="form-control">
            </div>
            <button id="btn-do-login" class="btn btn-primary w-100">Login</button>
            <p id="login-error" class="text-danger mt-2" style="display:none;">Invalid credentials</p>
        </div>

        <!-- User Dashboard -->
        <div id="user-dashboard">
            <h2 id="txt-welcome">Welcome</h2>
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h5>Current State</h5>
                        <div class="d-flex align-items-center">
                            <span id="state-dot" class="state-indicator me-2"></span>
                            <span id="state-name">Loading...</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-3 shadow-sm">
                        <h5>Recommendations</h5>
                        <p id="recommendation-text">Please select or register a device to see data.</p>
                    </div>
                </div>
            </div>
            
            <button id="btn-admin-view" class="btn btn-link mt-4">Switch to Admin View (Requires Admin Rights)</button>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel">
            <h3>System Administration</h3>
            <div class="alert alert-info">Admin access granted. Monitoring system health.</div>
            <div class="row mt-3">
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5>User Management</h5>
                        <button class="btn btn-primary btn-sm mt-2">List Active Users</button>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5>System Logs & Backup</h5>
                        <button class="btn btn-secondary btn-sm mt-2">Export Database</button>
                    </div>
                </div>
            </div>
            <button id="btn-back-dashboard" class="btn btn-link mt-3">Back to Dashboard</button>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('sm_token');

        function checkAuth() {
            if (token) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-dashboard').style.display = 'block';
                document.getElementById('nav-controls').style.display = 'block';
                fetchData();
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('user-dashboard').style.display = 'none';
                document.getElementById('nav-controls').style.display = 'none';
            }
        }

        async function fetchData() {
            // In a real app, we would fetch /api/v1/status/current/1
            // For now, we simulate data display if logged in
            document.getElementById('state-name').innerText = "Calm (Connected)";
            document.getElementById('state-dot').className = "state-indicator state-calm";
        }

        document.getElementById('btn-do-login').addEventListener('click', async () => {
            const username = document.getElementById('login-user').value;
            const password = document.getElementById('login-pass').value;

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    token = data.access_token;
                    localStorage.setItem('sm_token', token);
                    checkAuth();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('sm_token');
            token = null;
            checkAuth();
        });

        document.getElementById('btn-admin-view').addEventListener('click', () => {
            // For MVP, we check a mock header or just switch if logged in
            document.getElementById('user-dashboard').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        });

        document.getElementById('btn-back-dashboard').addEventListener('click', () => {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('user-dashboard').style.display = 'block';
        });

        checkAuth();
    </script>
</body>
</html>
